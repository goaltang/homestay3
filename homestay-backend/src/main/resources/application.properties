# 应用服务 WEB 访问端口
server.port=8080

# 数据库配置 - 增强容错性
spring.datasource.url=jdbc:mysql://localhost:3306/homestay_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8&useUnicode=true&autoReconnect=true&failOverReadOnly=false&maxReconnects=3
spring.datasource.username=root
spring.datasource.password=111111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 连接池配置
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA配置 - 临时改为update模式以创建违规管理相关表
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway数据库迁移配置
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=false

# JWT配置
jwt.secret=q8hVpEO8CXfjJ5P6YMcVWeRfQlL1Zn4wdAFZu2xKi7gUsTrm3NbH
jwt.expiration=86400000

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.resolve-lazily=true

# 跨域配置
spring.web.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# 日志配置 - 增强错误诊断
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.com.homestay3.homestaybackend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=DEBUG
logging.level.org.springframework.dao=DEBUG
logging.level.org.springframework.transaction=DEBUG

# 静态资源配置
spring.mvc.static-path-pattern=/static/**
spring.web.resources.static-locations=classpath:/static/,file:./uploads/

# 更多静态资源映射，确保文件可访问
spring.mvc.resources.add-mappings=true
spring.mvc.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:./uploads/
spring.mvc.resources.cache.period=0

# 添加自定义资源映射，确保api/files路径映射到uploads目录
spring.mvc.resources.static-patterns[0]=/api/files/**
spring.mvc.resources.static-mapping[0]=file:./uploads/

# Jackson配置
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.jackson.default-property-inclusion=NON_NULL

# 邮件配置
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.default-encoding=UTF-8

# 前端URL
app.frontend-url=http://localhost:5173

# 文件上传配置
file.upload-dir=uploads
file.max-file-size=10485760
file.allowed-file-types=image/jpeg,image/png,image/gif,image/webp,image/bmp

# 收益设置
app.earnings.host-share-rate=0.80

# Redis配置
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.password=000000
spring.data.redis.timeout=5000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1

# 缓存配置
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# 错误处理配置
server.error.include-stacktrace=on_param
server.error.include-message=always
server.error.include-binding-errors=always

# 支付宝沙箱配置
payment.alipay.app-id=9021000149671635
payment.alipay.private-
payment.alipay.public-
payment.alipay.gateway-url=https://openapi.alipaydev.com/gateway.do
payment.alipay.notify-url=http://localhost:8080/api/payment/alipay/notify
payment.alipay.return-url=http://localhost:5173/orders/pay/success

# 支付相关配置
payment.timeout-minutes=10
payment.retry-count=3
payment.async-notify-enabled=true

# 网络连接配置 - 大幅增加超时时间以应对网络不稳定
payment.alipay.connect-timeout=30000
payment.alipay.read-timeout=180000
payment.alipay.max-retries=5
payment.alipay.retry-delay=2000

# HTTP客户端配置 - 提高网络容错性
spring.http.client.connection-timeout=30000
spring.http.client.read-timeout=180000
spring.http.client.write-timeout=60000

