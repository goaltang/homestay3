# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/homestay_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8&useUnicode=true
spring.datasource.username=CHANGE_ME
spring.datasource.password=CHANGE_ME
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JWT
jwt.secret=CHANGE_ME_USE_A_LONG_RANDOM_SECRET
jwt.expiration=86400000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads
file.max-file-size=10485760
file.allowed-file-types=image/jpeg,image/png,image/gif,image/webp,image/bmp

# CORS
spring.web.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# Mail
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=CHANGE_ME
spring.mail.password=CHANGE_ME
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

# Frontend
app.frontend-url=http://localhost:5173

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.password=
spring.data.redis.timeout=5000

# Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# Alipay sandbox
payment.alipay.app-id=CHANGE_ME
payment.alipay.private-key=CHANGE_ME
payment.alipay.public-key=CHANGE_ME
payment.alipay.gateway-url=https://openapi-sandbox.dl.alipaydev.com/gateway.do
payment.alipay.notify-url=http://localhost:8080/api/payment/alipay/notify
payment.alipay.return-url=http://localhost:5173/orders/pay/success

# Payment
payment.timeout-minutes=10
payment.retry-count=3
payment.async-notify-enabled=true

# Earnings
app.earnings.host-share-rate=0.80
