# 测试环境配置

# H2 内存数据库
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# 禁用 Flyway（测试环境由 Hibernate 自动建表）
spring.flyway.enabled=false

# 禁用 data.sql/schema.sql 初始化（测试环境由 Hibernate 自动建表）
spring.sql.init.mode=never

# 禁用 Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=simple

# 禁用邮件
spring.mail.host=localhost
spring.mail.port=25

# Elasticsearch 禁用（测试环境不需要）
elasticsearch.enabled=false
spring.data.elasticsearch.repositories.enabled=false

# 允许测试配置覆盖主配置中的 Bean（如 RedissonClient Mock）
spring.main.allow-bean-definition-overriding=true

# 日志
logging.level.org.springframework.data.elasticsearch=DEBUG
logging.level.com.homestay3.homestaybackend=DEBUG
